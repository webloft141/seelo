<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Seelo — Sign in with Google</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f0f0; display: flex; align-items: center;
      justify-content: center; min-height: 100vh; margin: 0;
      font-size: 14px; color: #111;
    }
    .card {
      background: #fff; padding: 32px; border-radius: 12px;
      text-align: center; max-width: 340px;
    }
    .spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0;
      border-top-color: #111; border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 16px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .check { font-size: 48px; color: #22c55e; margin: 8px 0; }
    .error { color: #ef4444; margin-top: 12px; font-size: 13px; }
    .btn { display: inline-block; padding: 10px 20px; background: #111;
      color: #fff; border: none; border-radius: 6px; font-size: 13px;
      font-weight: 600; cursor: pointer; margin-top: 16px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <p id="status">Signing in with Google...</p>
    <p class="error" id="error"></p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBS6bV8-6kC8bEsEOs5k2kMtPUEqhaYCbQ",
      authDomain: "seelo-acef3.firebaseapp.com",
      projectId: "seelo-acef3",
      storageBucket: "seelo-acef3.firebasestorage.app",
      messagingSenderId: "351826158810",
      appId: "1:351826158810:web:7d437fbd1d333fddcc71e3",
    };

    const auth = firebase.initializeApp(firebaseConfig).auth();
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const spinnerEl = document.getElementById('spinner');

    // Get sessionId from URL
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('sessionId') || '';
    const baseUrl = window.location.origin;

    function showSuccess() {
      document.getElementById('card').innerHTML = `
        <div class="check">&#10003;</div>
        <p style="font-size:16px;font-weight:600;">Signed in successfully!</p>
        <p style="font-size:13px;color:#666;">You can close this tab now.</p>
      `;
    }

    function showError(msg) {
      spinnerEl.style.display = 'none';
      statusEl.style.display = 'none';
      errorEl.textContent = msg;
    }

    async function completeAuth(user) {
      try {
        const idToken = await user.getIdToken(true);
        const resp = await fetch(baseUrl + '/api/auth/complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, idToken }),
        });
        if (resp.ok) {
          showSuccess();
        } else {
          const data = await resp.json();
          showError(data.error || 'Failed to complete sign-in');
        }
      } catch (e) {
        showError('Network error: ' + e.message);
      }
    }

    // Check if returning from redirect
    auth.getRedirectResult().then(async (result) => {
      if (result && result.user) {
        await completeAuth(result.user);
      } else {
        // First visit — start Google sign-in
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.addScope('email');
        provider.setCustomParameters({ prompt: 'select_account' });
        auth.signInWithRedirect(provider);
      }
    }).catch(async (err) => {
      // Try to get current user anyway
      const user = auth.currentUser;
      if (user) {
        await completeAuth(user);
      } else {
        showError(err.message || 'Authentication failed');
      }
    });

    // Fallback: onAuthStateChanged
    auth.onAuthStateChanged(user => {
      if (user) {
        // Only handle if getRedirectResult didn't fire
        auth.getRedirectResult().catch(() => {});
      }
    });
  </script>
</body>
</html>
