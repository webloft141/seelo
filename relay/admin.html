<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seelo Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e2e8f0;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:20px}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#12121a;padding:40px;border-radius:16px;border:1px solid #1e1f28;width:360px}
.login-card h1{font-size:24px;margin-bottom:8px}
.login-card p{color:#64748b;font-size:14px;margin-bottom:24px}
.login-card input{width:100%;padding:12px 14px;background:#0a0a0f;border:1px solid #1e1f28;border-radius:10px;color:#e2e8f0;font-size:14px;margin-bottom:16px;outline:none}
.login-card input:focus{border-color:#6366f1}
.login-card button{width:100%;padding:12px;background:#6366f1;border:none;border-radius:10px;color:white;font-size:14px;font-weight:600;cursor:pointer}
.login-error{color:#ef4444;font-size:13px;margin-top:8px;display:none}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #1e1f28}
.header h1{font-size:22px;display:flex;align-items:center;gap:10px}
.header h1 span{font-size:14px;color:#64748b;font-weight:400}
.logout-btn{background:none;border:1px solid #1e1f28;color:#94a3b8;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px}
.logout-btn:hover{border-color:#ef4444;color:#ef4444}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#12121a;border:1px solid #1e1f28;border-radius:12px;padding:16px}
.stat-card .label{font-size:12px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:24px;font-weight:700}
.stat-card .value.green{color:#22c55e}
.stat-card .value.blue{color:#6366f1}
.stat-card .value.gold{color:#f59e0b}
.form-card{background:#12121a;border:1px solid #1e1f28;border-radius:12px;padding:20px;margin-bottom:24px}
.form-card h2{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.form-row{display:flex;gap:12px;flex-wrap:wrap}
.form-group{flex:1;min-width:160px}
.form-group label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px 12px;background:#0a0a0f;border:1px solid #1e1f28;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#6366f1}
.form-actions{margin-top:16px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-primary{background:#6366f1;color:white}
.btn-success{background:#22c55e;color:white}
.table-wrap{background:#12121a;border:1px solid #1e1f28;border-radius:12px;overflow:hidden}
.table-top{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #1e1f28;flex-wrap:wrap;gap:12px}
.table-top h2{font-size:16px}
.table-ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.table-ctrl input{padding:8px 12px;background:#0a0a0f;border:1px solid #1e1f28;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;width:200px}
.table-ctrl input:focus{border-color:#6366f1}
.table-ctrl select{padding:8px 12px;background:#0a0a0f;border:1px solid #1e1f28;border-radius:8px;color:#e2e8f0;font-size:13px;cursor:pointer;outline:none}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;border-bottom:1px solid #1e1f28;white-space:nowrap}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid #0a0a0f}
tr:hover td{background:#0f0f18}
.s-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.s-avail{background:#22c55e20;color:#22c55e}
.s-used{background:#64748b20;color:#94a3b8}
.key-mono{font-family:'SF Mono','Fira Code',monospace;font-size:12px;letter-spacing:.5px;color:#a78bfa}
.p-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}
.p-pro{background:#6366f120;color:#818cf8}
.p-team{background:#22c55e20;color:#4ade80}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:10px;color:white;font-size:13px;font-weight:500;z-index:100;animation:slideUp .3s ease;display:none}
.toast.ok{background:#22c55e}
.toast.err{background:#ef4444}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){.form-group{min-width:100%}.table-ctrl input{width:100%}}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <h1>🔐 Seelo Admin</h1>
    <p>License key management & accounting</p>
    <input type="password" id="pw" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()" autofocus>
    <button onclick="login()">Sign In</button>
    <div class="login-error" id="err">Wrong password</div>
  </div>
</div>
<div id="dash" style="display:none">
  <div class="container">
    <div class="header"><h1>Seelo <span>Admin Dashboard</span></h1><button class="logout-btn" onclick="logout()">Sign Out</button></div>
    <div class="stats-grid" id="stats"></div>
    <div class="form-card">
      <h2>+ Generate License Key</h2>
      <div class="form-row">
        <div class="form-group"><label>Plan</label><select id="plan"><option value="pro_monthly">Pro Monthly</option><option value="pro_yearly">Pro Yearly</option><option value="team_monthly">Team Monthly</option><option value="team_yearly">Team Yearly</option></select></div>
        <div class="form-group"><label>Days</label><input type="number" id="days" value="30"></div>
        <div class="form-group"><label>Customer Name</label><input type="text" id="name" placeholder="Rahul Sharma"></div>
        <div class="form-group"><label>Customer Email</label><input type="email" id="email" placeholder="rahul@email.com"></div>
        <div class="form-group"><label>Amount (Rs)</label><input type="number" id="amt" placeholder="1990"></div>
        <div class="form-group"><label>Notes</label><input type="text" id="notes" placeholder=""></div>
      </div>
      <div class="form-actions"><button class="btn btn-primary" onclick="genKey()">Generate Key</button></div>
    </div>
    <div class="table-wrap">
      <div class="table-top"><h2>License Keys</h2><div class="table-ctrl">
        <select id="filter" onchange="render()"><option value="all">All</option><option value="avail">Available</option><option value="used">Used</option></select>
        <input type="text" id="search" placeholder="Search..." oninput="render()">
        <button class="btn btn-success" onclick="expCSV()">CSV</button>
      </div></div>
      <div style="overflow-x:auto"><table><thead><tr><th>Key</th><th>Plan</th><th>Days</th><th>Customer</th><th>Email</th><th>Amount</th><th>Status</th><th>Used By</th><th>Created</th></tr></thead><tbody id="rows"></tbody></table></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var token = sessionStorage.getItem('atok');
var qtoken = new URLSearchParams(window.location.search).get('token');
if (qtoken) { token = qtoken; sessionStorage.setItem('atok', qtoken); }

function login() {
  var p = document.getElementById('pw').value;
  fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:p}) })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.token) {
        token = d.token;
        sessionStorage.setItem('atok', token);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dash').style.display = 'block';
        loadDash();
      } else {
        document.getElementById('err').style.display = 'block';
      }
    })
    .catch(function(){ toast('Server error', 'err'); });
}

function logout() {
  sessionStorage.removeItem('atok');
  token = null;
  document.getElementById('dash').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 3000);
}

function h() {
  return { 'Content-Type':'application/json', 'X-Admin-Token': token };
}

function loadDash() {
  loadStats();
  render();
}

function loadStats() {
  fetch('/api/admin/stats', { headers: h() })
    .then(function(r){
      if (r.status === 401) { logout(); return null; }
      return r.json();
    })
    .then(function(d){
      if (!d) return;
      document.getElementById('stats').innerHTML =
        '<div class=stat-card><div class=label>Total Keys</div><div class="value blue">' + d.totalKeys + '</div></div>' +
        '<div class=stat-card><div class=label>Available</div><div class="value green">' + d.availableKeys + '</div></div>' +
        '<div class=stat-card><div class=label>Used</div><div class=value>' + d.usedKeys + '</div></div>' +
        '<div class=stat-card><div class=label>Revenue</div><div class="value gold">Rs ' + d.totalRevenue.toLocaleString() + '</div></div>' +
        '<div class=stat-card><div class=label>Users</div><div class="value blue">' + d.totalUsers + '</div></div>' +
        '<div class=stat-card><div class=label>Pro/Team</div><div class="value green">' + d.proUsers + '</div></div>';
    })
    .catch(function(){ toast('Stats failed', 'err'); });
}

var allKeys = [];

function render() {
  fetch('/api/admin/keys', { headers: h() })
    .then(function(r){
      if (r.status === 401) { logout(); return null; }
      return r.json();
    })
    .then(function(d){
      if (!d) return;
      allKeys = d.keys;
      var fl = document.getElementById('filter').value;
      var sr = document.getElementById('search').value.toLowerCase();
      var kk = allKeys;
      if (fl === 'avail') kk = kk.filter(function(x){ return !x.usedBy; });
      if (fl === 'used') kk = kk.filter(function(x){ return x.usedBy; });
      if (sr) kk = kk.filter(function(x){ return (x.key + x.customerName + x.customerEmail).toLowerCase().indexOf(sr) !== -1; });

      var tb = document.getElementById('rows');
      if (kk.length === 0) {
        tb.innerHTML = '<tr><td colspan=9 style=text-align:center;color:#64748b;padding:40px>No keys</td></tr>';
        return;
      }

      var html = '';
      for (var i = 0; i < kk.length; i++) {
        var k = kk[i];
        var st = k.usedBy ? '<span class="s-badge s-used">USED</span>' : '<span class="s-badge s-avail">AVAILABLE</span>';
        var pc = k.plan.indexOf('team') !== -1 ? 'p-team' : 'p-pro';
        var pl = k.plan.indexOf('yearly') !== -1 ? (k.plan.indexOf('team') !== -1 ? 'TEAM Y' : 'PRO Y') : (k.plan.indexOf('team') !== -1 ? 'TEAM M' : 'PRO M');
        var dt = new Date(k.createdAt).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'2-digit' });
        html += '<tr>' +
          '<td><span class=key-mono>' + k.key + '</span></td>' +
          '<td><span class="p-badge ' + pc + '">' + pl + '</span></td>' +
          '<td>' + k.durationDays + '</td>' +
          '<td>' + (k.customerName || '-') + '</td>' +
          '<td>' + (k.customerEmail || '-') + '</td>' +
          '<td style=font-weight:600>Rs ' + (k.amountPaid || 0).toLocaleString() + '</td>' +
          '<td>' + st + '</td>' +
          '<td style=font-size:11px;color:#64748b>' + (k.usedBy ? k.usedBy.slice(0,12) + '...' : '-') + '</td>' +
          '<td style=font-size:11px;color:#64748b>' + dt + '</td>' +
        '</tr>';
      }
      tb.innerHTML = html;
    })
    .catch(function(){ toast('Load failed', 'err'); });
}

function genKey() {
  var b = {
    planId: document.getElementById('plan').value,
    durationDays: document.getElementById('days').value,
    customerName: document.getElementById('name').value,
    customerEmail: document.getElementById('email').value,
    amountPaid: document.getElementById('amt').value,
    notes: document.getElementById('notes').value
  };
  if (!b.customerName) { toast('Enter customer name', 'err'); return; }

  fetch('/api/admin/keys', { method:'POST', headers: h(), body: JSON.stringify(b) })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success) {
        toast('Key: ' + d.key, 'ok');
        document.getElementById('name').value = '';
        document.getElementById('email').value = '';
        document.getElementById('amt').value = '';
        document.getElementById('notes').value = '';
        loadStats();
        render();
      } else {
        toast(d.error, 'err');
      }
    })
    .catch(function(){ toast('Failed', 'err'); });
}

function expCSV() {
  window.open('/api/admin/export/csv?token=' + token, '_blank');
}

if (token) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
  loadDash();
}
</script>
</body>
</html>
