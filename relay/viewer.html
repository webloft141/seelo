<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seelo Live Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --gray: #0c0d12; --accent: #6366f1; --success: #2ed573; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background: var(--bg); color: #fff;
            font-family: 'Outfit', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .glow {
            position: absolute; width: 400px; height: 400px; border-radius: 50%;
            background: rgba(99, 102, 241, 0.08); filter: blur(80px); z-index: 0; pointer-events: none;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; }
        .viewer-container { position: relative; z-index: 1; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .status-bar {
            position: absolute; top: 24px; display: flex; align-items: center; gap: 12px;
            padding: 10px 20px; background: rgba(12, 13, 18, 0.6); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 40px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot.red { background: #ff4757; box-shadow: 0 0 10px #ff4757; }
        .dot.gray { background: #666; box-shadow: none; }
        .title { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
        .sub { font-size: 12px; color: #94a3b8; border-left: 1px solid rgba(255,255,255,0.15); padding-left: 12px; }
        .canvas-wrapper { position: relative; max-width: 95vw; max-height: 85vh; display: flex; justify-content: center; align-items: center; box-shadow: 0 20px 60px rgba(0,0,0,0.8); border-radius: 20px; overflow: hidden; background: #000; }
        .canvas-image { width: 100%; height: auto; max-height: 85vh; object-fit: contain; display: block; opacity: 0; transition: opacity 0.5s ease-in-out; }
        .canvas-image.loaded { opacity: 1; }
        .loader { display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(99, 102, 241, 0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s infinite linear; }
        .loader-text { font-size: 14px; color: #94a3b8; font-weight: 600; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="viewer-container">
        <div class="status-bar" id="status-bar" style="display:none;">
            <div class="dot" id="status-dot"></div>
            <span class="title">SEELO LIVE</span>
            <span class="sub" id="status-text">Connecting...</span>
        </div>
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <div class="loader-text">Waiting for Seelo Live Connection...</div>
        </div>
        <div id="canvas-wrapper" class="canvas-wrapper" style="display:none;">
            <img id="canvas-image" class="canvas-image" alt="Live Preview">
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('sessionId');

        if (!sessionId) {
            document.getElementById('loader').innerHTML = '<div style="font-size:32px;">⚠️</div><div class="loader-text" style="color:#ff4757;">Invalid Link</div><div style="font-size:12px;color:#666;margin-top:5px;">Session ID missing from URL.</div>';
        } else {
            document.getElementById('status-bar').style.display = 'flex';
            
            const serverUrl = window.location.origin;
            const socket = io(serverUrl);

            socket.on('connect', () => {
                socket.emit('join-session', { sessionId, role: 'viewer' });
                document.getElementById('status-text').innerText = 'Connected';
                document.getElementById('status-dot').className = 'dot';
            });

            socket.on('disconnect', () => {
                document.getElementById('status-text').innerText = 'Disconnected';
                document.getElementById('status-dot').className = 'dot red';
            });

            socket.on('viewer-count', (count) => {
                document.getElementById('status-text').innerText = count + ' viewer' + (count !== 1 ? 's' : '');
            });

            socket.on('cloud-design', (data) => {
                document.getElementById('loader').style.display = 'none';
                const wrapper = document.getElementById('canvas-wrapper');
                const img = document.getElementById('canvas-image');
                wrapper.style.display = 'flex';

                const src = data.imageUrl || data.imageData;
                if (!src) return;

                const tempImg = new Image();
                tempImg.src = src;
                tempImg.onload = () => {
                    img.src = src;
                    img.classList.add('loaded');
                };
            });
        }
    </script>
</body>
</html>
