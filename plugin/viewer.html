<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seelo Pro - Live Web Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --gray: #0c0d12;
            --gray-light: #1e202f;
            --accent: #6366f1;
            --success: #2ed573;
            --gradient: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Ambient Glowing Accents */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.08);
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; }

        .viewer-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* Glassmorphic Header Card */
        .viewer-header {
            position: absolute;
            top: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            background: rgba(12, 13, 18, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .header-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .header-subtitle {
            font-size: 12px;
            color: #94a3b8;
            border-left: 1px solid rgba(255,255,255,0.15);
            padding-left: 12px;
        }

        /* Canvas Wrapper & Scaler */
        .canvas-wrapper {
            position: relative;
            max-width: 95vw;
            max-height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            transition: transform 0.3s ease;
        }

        .canvas-image {
            width: 100%;
            height: auto;
            max-height: 85vh;
            object-fit: contain;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .canvas-image.loaded {
            opacity: 1;
        }

        /* Loading Spinner */
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        .loader-text {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 600;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="viewer-container">
        <!-- Floating Active Status -->
        <div id="active-header" class="viewer-header" style="display: none;">
            <div class="status-dot"></div>
            <span class="header-title">SEELO LIVE VIEW</span>
            <span class="header-subtitle" id="connection-state">Connecting...</span>
        </div>

        <!-- Main Mirroring Area -->
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <div class="loader-text">Waiting for Seelo Live Connection...</div>
        </div>

        <div id="canvas-wrapper" class="canvas-wrapper" style="display: none;">
            <img id="canvas-image" class="canvas-image" alt="Seelo Live Prototype">
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAz3Mr3JSer6UD7z8RBoXzFExfLtXSqpZY",
            authDomain: "seelo-acef3.firebaseapp.com",
            databaseURL: "https://seelo-acef3-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "seelo-acef3",
            storageBucket: "seelo-acef3.firebasestorage.app",
            messagingSenderId: "351826158810",
            appId: "1:351826158810:web:7d437fbd1d333fddcc71e3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Parse query params
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'cloud';
        const sessionId = urlParams.get('sessionId');
        const userId = urlParams.get('userId');

        // Generate viewer identity for presence tracking
        const viewerId = 'v_' + Math.random().toString(36).substring(2, 10) + Date.now().toString(36);

        let dbPath = '';
        if (mode === 'user' && userId) {
            dbPath = 'users/' + userId + '/canvas';
            document.getElementById('connection-state').innerText = 'Cloud Account';
        } else if (sessionId) {
            dbPath = 'sessions/' + sessionId;
            document.getElementById('connection-state').innerText = 'Session Sync';

            // Register viewer presence
            const viewerRef = db.ref('sessions/' + sessionId + '/viewers/' + viewerId);
            viewerRef.set({ name: 'Viewer', ua: navigator.userAgent.substring(0, 100), connectedAt: Date.now() });
            viewerRef.onDisconnect().remove();
        }

        if (dbPath) {
            document.getElementById('active-header').style.display = 'flex';
            
            db.ref(dbPath).on('value', (snap) => {
                const val = snap.val();
                if (val && val.design) {
                    const design = val.design;
                    
                    // Hide loader, show canvas
                    document.getElementById('loader').style.display = 'none';
                    const wrapper = document.getElementById('canvas-wrapper');
                    const img = document.getElementById('canvas-image');
                    
                    wrapper.style.display = 'flex';
                    
                    // Load image from Storage URL (or fallback to inline base64)
                    const src = design.imageUrl || design.imageData;
                    if (!src) return;
                    
                    // Preload new image to ensure smooth transition
                    const tempImg = new Image();
                    tempImg.src = src;
                    tempImg.onload = () => {
                        img.src = src;
                        img.classList.add('loaded');
                        
                        // Clear existing video elements
                        const existingVideos = wrapper.querySelectorAll('video');
                        existingVideos.forEach(v => v.remove());

                        // Render new video layers
                        if (design.videoLayers) {
                            const scale = img.clientWidth / design.width;
                            design.videoLayers.forEach(video => {
                                const videoEl = document.createElement('video');
                                videoEl.src = video.url;
                                videoEl.style.position = 'absolute';
                                videoEl.style.left = (video.x * scale) + 'px';
                                videoEl.style.top = (video.y * scale) + 'px';
                                videoEl.style.width = (video.width * scale) + 'px';
                                videoEl.style.height = (video.height * scale) + 'px';
                                videoEl.style.objectFit = 'cover';
                                videoEl.autoplay = true;
                                videoEl.loop = true;
                                videoEl.muted = true;
                                videoEl.playsInline = true;
                                wrapper.appendChild(videoEl);
                            });
                        }
                    };
                }
            });
        } else {
            document.getElementById('loader').innerHTML = `
                <div style="font-size: 32px;">⚠️</div>
                <div class="loader-text" style="color: #ff4757;">Invalid Share Link</div>
                <div style="font-size: 12px; color: #666; margin-top: 5px;">Make sure the URL contains valid session or account parameters.</div>
            `;
        }
    </script>
</body>
</html>
